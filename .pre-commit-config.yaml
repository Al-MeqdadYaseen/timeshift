repos:
  - repo: https://github.com/psf/black
    rev: 25.11.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: prettier
        name: prettier (local)
        entry: npx prettier --write
        language: system
        types_or: [javascript, html, css, markdown, yaml]
        exclude: "templates/.*\\.html$"

