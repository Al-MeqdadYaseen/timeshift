<!DOCTYPE html>
<html>
<head>
    <title>Timeshift - Time Dilation Calculator</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <header>
        <h1>⏱️ Timeshift</h1>
        <p>Explore time dilation through special and general relativity</p>
    </header>
    
    <nav>
        <ul>
            <li><a href="{% url 'core:home' %}">Home</a></li>
            <li><a href="{% url 'core:relativistic' %}">Special Relativity</a></li>
            <li><a href="{% url 'core:gravitational' %}">Gravitational</a></li>
        </ul>
    </nav>
    
    <main>
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li {% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </main>

    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
